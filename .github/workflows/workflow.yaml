name: Download files from GTA5-mods

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs track "*.rar"
          git lfs track "*.zip"
          git lfs track "*.7z"
          git add .gitattributes

      - name: Download files
        run: |
          mkdir -p mods

          curl --globoff -L "https://files.gta5-mods.com/uploads/codewalker-gtav-interactive-3d-map/1cfcd8-CodeWalker30_dev46.zip" -o "mods/codewalker.zip"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Add GTA5 mods files" || echo "No changes to commit"

          git push
