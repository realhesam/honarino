name: Download file from Google Drive

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download file
        run: |
          mkdir -p data
          curl -L "https://drive.usercontent.google.com/u/0/uc?id=1aEBl0by1WtOObKUQjS_GkGzSGCHtqCiF&export=download" -o data/file.bin

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/file.bin
          git commit -m "Add downloaded file" || echo "No changes"
          git push
